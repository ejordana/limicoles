grups:
  - id: limicoles-petits
    nom: "Limícoles petits"
    mida: "14–27 cm"
    habitat: "Platges · Fangars · Prats humits"
    clau: "Limícoles de mida petita amb bec curt o mitjà. Distinguibles per la mida del bec, el color de les potes i els patrons del plomatge dorsal."
    il_lustracions:
      - fitxer: limicoles-petits.jpg
        peu: "Corriol pit-roig, Daurada grossa, Pigre gris"
    diferencies:
      - caracter: "Bec"
        descripcio: "Corriol petit: fi i prim; Corriol gros: clarament més gruixut; Corriol camanegre: negre, prim"
      - caracter: "Potes"
        descripcio: "Corriols petit i gros: carn/ataronjades; Corriol camanegre: NEGRES"
      - caracter: "Plomatge"
        descripcio: "Daurada: dors daurat; Pigre gris: dors gris; Remena-rocs: mosaic marró-negre"
    especies:
      - nom: "Corriol petit"
        nom_cientific: "Charadrius dubius"
        imatge: "charadrius-dubius.jpg"
        mida: "15–18 cm"
        caracteristiques:
          - label: "Bec"
            desc: "fi i prim, negre"
          - label: "Potes"
            desc: "color carn/groguenques; carúncula ocular groga"
          - label: "Cap"
            desc: "collaret negre + franja blanca entre pili i barra frontal"
          - label: "Vol"
            desc: "sense franja alar blanca"
      - nom: "Corriol gros"
        nom_cientific: "Charadrius hiaticula"
        imatge: "charadrius-hiaticula.jpg"
        mida: "17–20 cm"
        caracteristiques:
          - label: "Bec"
            desc: "clarament més gruixut; ataronjat amb punta negra (nup.)"
          - label: "Potes"
            desc: "ataronjades"
          - label: "Cap"
            desc: "SENSE franja blanca entre pili i barra frontal (diferència clau)"
          - label: "Vol"
            desc: "franja alar blanca distintiva"
      - nom: "Corriol camanegre"
        nom_cientific: "Charadrius alexandrinus"
        imatge: "charadrius-alexandrinus.jpg"
        mida: "15–17 cm"
        caracteristiques:
          - label: "Potes"
            desc: "NEGRES (caràcter diagnòstic principal)"
          - label: "Bec"
            desc: "prim i negre, front angulós"
          - label: "Collaret"
            desc: "incomplet, taques laterals al coll"
          - label: "♂ nup."
            desc: "pili canyella i franja frontal negra"
      - nom: "Daurada grossa"
        nom_cientific: "Pluvialis apricaria"
        imatge: "pluvialis-apricaria.jpg"
        mida: "26–29 cm"
        caracteristiques:
          - label: "Dors"
            desc: "daurat/ocre amb taques negres i daurades"
          - label: "Nup."
            desc: "parts inferiors negres"
          - label: "Vol"
            desc: "ales completament fosques per sota"
      - nom: "Pigre gris"
        nom_cientific: "Pluvialis squatarola"
        imatge: "pluvialis-squatarola.png"
        mida: "27–30 cm"
        caracteristiques:
          - label: "Dors"
            desc: "gris cendrós (no daurat)"
          - label: "Nup."
            desc: "cara i pit negres, dors gris"
          - label: "Vol"
            desc: "taca axil·lar negra característica"
      - nom: "Remena-rocs"
        nom_cientific: "Arenaria interpres"
        imatge: "arenaria-interpres.jpg"
        mida: "21–25 cm"
        caracteristiques:
          - label: "Plomatge"
            desc: "patró de mosaic marró-negre-blanc molt característic"
          - label: "Potes"
            desc: "ataronajdes/vermelloses"
          - label: "Hàbitat"
            desc: "roques i costes pedregoses"

  - id: territs
    nom: "Territs"
    mida: "14–26 cm"
    habitat: "Fangars · Platges · Estuaris"
    clau: "Limícoles petits i compactes del gènere Calidris. Sovint gregaris. Clau: mida, forma del bec i plomatge nupcial. El Territ tres dits és l'únic sense dit posterior."
    il_lustracions:
      - fitxer: territs-a.jpg
        peu: "Territ gros, Territ tres dits, Territ fosc"
      - fitxer: territs-b.jpg
        peu: "Territ pectoral, Territ becllarg, Territ variant"
      - fitxer: territs-c.jpg
        peu: "Territ menut, Territ de Temminck, Territ becadell"
    diferencies:
      - caracter: "Mida"
        descripcio: "Territ menut i Temminck: 14-15 cm; Territ gros: 23-26 cm"
      - caracter: "Bec"
        descripcio: "Territ becllarg: corbat cap avall; Territ tres dits: curt i recte; Territ variant: mig corbat"
      - caracter: "Potes"
        descripcio: "Territ tres dits: SENSE dit posterior (únic!); Territ Temminck: potes clares"
      - caracter: "Plomatge nup."
        descripcio: "Territ gros: pit rogenc intens; Territ fosc: parts superiors negroses"
    especies:
      - nom: "Territ menut comú"
        nom_cientific: "Calidris minuta"
        imatge: "calidris-minuta.jpg"
        mida: "14–15 cm"
        caracteristiques:
          - label: "Mida"
            desc: "molt petit, el més petit dels territs"
          - label: "Bec"
            desc: "curt i recte, negre"
          - label: "Hivern"
            desc: "dors gris, parts inferiors blanques"
          - label: "Jove"
            desc: "doble V blanca a l'esquena característica"
      - nom: "Territ de Temminck"
        nom_cientific: "Calidris temminckii"
        imatge: "calidris-temminckii.jpg"
        mida: "14–15 cm"
        caracteristiques:
          - label: "Potes"
            desc: "CLARES/groguenques (vs. fosques del Territ menut)"
          - label: "Cua"
            desc: "sobresurt per darrere de la punta de l'ala (aspecte llargarut)"
          - label: "Hivern"
            desc: "dors i pit grisencs uniformes; cara pàl·lida SENSE cella blanquinosa"
          - label: "Reclam"
            desc: "«tirrrt» vibrant"
      - nom: "Territ tres dits"
        nom_cientific: "Calidris alba"
        imatge: "calidris-alba.jpg"
        mida: "18–21 cm"
        caracteristiques:
          - label: "Potes"
            desc: "SENSE dit posterior (únic entre els territs!); potes negres"
          - label: "Hivern"
            desc: "molt pàl·lid, dors gris clar, parts inferiors blanques"
          - label: "Hàbitat"
            desc: "platges sorrenques, segueix les onades"
      - nom: "Territ variant"
        nom_cientific: "Calidris alpina"
        imatge: "calidris-alpina.png"
        mida: "17–21 cm"
        caracteristiques:
          - label: "Bec"
            desc: "negre, mig llarg, extrem lleugerament corbat"
          - label: "Nup."
            desc: "gran taca ventral negra sobre fons blanc; dors rogenc"
          - label: "Hivern"
            desc: "grisencs uniformes; carpó blanc dividit per línia negra"
          - label: "Reclam"
            desc: "«triip» característic"
      - nom: "Territ becllarg"
        nom_cientific: "Calidris ferruginea"
        imatge: "calidris-ferruginea.jpg"
        mida: "19–22 cm"
        caracteristiques:
          - label: "Bec"
            desc: "llarg, corbat cap avall a l'extrem (caràcter diagnòstic)"
          - label: "Nup."
            desc: "cap, pit i ventre granes/rovellats"
          - label: "Vol"
            desc: "carpó blanc sense franja central negra"
      - nom: "Territ gros"
        nom_cientific: "Calidris canutus"
        imatge: "calidris-canutus.jpg"
        mida: "23–26 cm"
        caracteristiques:
          - label: "Mida"
            desc: "el més gran dels territs, corpulent"
          - label: "Bec"
            desc: "relativament curt i recte per la seva mida"
          - label: "Nup."
            desc: "parts inferiors rogues/vermelloses intenses"
          - label: "Hivern"
            desc: "gris uniforme; carpó gris pàl·lid"
      - nom: "Territ fosc"
        nom_cientific: "Calidris maritima"
        imatge: "calidris-maritima.jpg"
        mida: "19–22 cm"
        caracteristiques:
          - label: "Plomatge"
            desc: "molt fosc, gris pissarra, aspecte rodanxó"
          - label: "Potes"
            desc: "ataronjades/grogues (contrast amb el cos fosc)"
          - label: "Hàbitat"
            desc: "costes rocoses (molt rar a Catalunya)"
      - nom: "Territ becadell"
        nom_cientific: "Calidris falcinellus"
        imatge: "calidris-falcinellus.jpg"
        mida: "15–18 cm"
        caracteristiques:
          - label: "Bec"
            desc: "punta clarament torçada cap avall"
          - label: "Cella"
            desc: "i llista pileal blanques ben definides, contrasten amb pili negre"
          - label: "Notes"
            desc: "molt rar, ruta migratòria oriental"

  - id: tringes
    nom: "Tringes"
    mida: "18–34 cm"
    habitat: "Aiguamolls · Rius · Llacs"
    clau: "Limícoles de mida mitjana, potes i bec relativament llargs. El color de les potes és el primer caràcter a observar. La Xivitona es distingeix per la postura encorbada i el moviment constant de la cua."
    il_lustracions:
      - fitxer: tringes-a.jpg
        peu: "Siseta cendrosa, Gamba roja, Gamba roja pintada"
      - fitxer: tringes-b.jpg
        peu: "Gamba groga petita, Siseta comuna, Gamba verda"
      - fitxer: tringes-c.jpg
        peu: "Xivita, Valona, Xivitona"
    diferencies:
      - caracter: "Potes"
        descripcio: "Gambes roges: vermelles; Gamba verda: verdoses; Gamba groga petita: grogues"
      - caracter: "Mida"
        descripcio: "Gamba verda: 30-34 cm (la més gran); Xivitona: 18-20 cm (la més petita)"
      - caracter: "Vol"
        descripcio: "Xivita: ales completament negres per sota; Gamba roja: franja alar blanca; Gamba verda: carpó blanc sense franja"
    especies:
      - nom: "Gamba roja comuna"
        nom_cientific: "Tringa totanus"
        imatge: "tringa-totanus.jpg"
        mida: "24–27 cm"
        caracteristiques:
          - label: "Potes"
            desc: "VERMELLES (caràcter diagnòstic)"
          - label: "Bec"
            desc: "base vermella, punta fosca"
          - label: "Vol"
            desc: "àmplia franja alar blanca posterior"
          - label: "Reclam"
            desc: "«ti-diu-du» trisil·làbic"
      - nom: "Gamba roja pintada"
        nom_cientific: "Tringa erythropus"
        imatge: "tringa-erythropus.jpg"
        mida: "29–33 cm"
        caracteristiques:
          - label: "Potes"
            desc: "vermelles; bec fi i llarg, tot negre"
          - label: "Nup."
            desc: "bàsicament negra; cella blanca contrastant fora del nup."
          - label: "Vol"
            desc: "cua barrada i tascó blanc entre les ales (sense franja alar)"
      - nom: "Gamba verda"
        nom_cientific: "Tringa nebularia"
        imatge: "tringa-nebularia.jpg"
        mida: "30–34 cm"
        caracteristiques:
          - label: "Potes"
            desc: "VERDOSES; bec gruixut, llarg, lleug. corbat cap amunt"
          - label: "Vol"
            desc: "carpó i tascó blancs, sense franja alar"
          - label: "Reclam"
            desc: "potent «tiu-tiu-tiu»"
      - nom: "Gamba groga petita"
        nom_cientific: "Tringa flavipes"
        imatge: "tringa-flavipes.jpg"
        mida: "23–25 cm"
        caracteristiques:
          - label: "Potes"
            desc: "GROGUES; bec fi i recte"
          - label: "Vol"
            desc: "cua molt barrada, carpó blanc sense tascó blanc"
          - label: "Notes"
            desc: "divagant de Nord-amèrica"
      - nom: "Siseta comuna"
        nom_cientific: "Tringa stagnatilis"
        imatge: "tringa-stagnatilis.jpg"
        mida: "22–25 cm"
        caracteristiques:
          - label: "Potes"
            desc: "verdoses/oliva, molt llargues i fines"
          - label: "Bec"
            desc: "molt prim, recte i negre"
          - label: "Aspecte"
            desc: "molt esvelt; peus sobresurten per darrere la cua"
      - nom: "Xivita comuna"
        nom_cientific: "Tringa ochropus"
        imatge: "tringa-ochropus.jpg"
        mida: "20–24 cm"
        caracteristiques:
          - label: "Plomatge"
            desc: "molt fosc (quasi negre) per sobre"
          - label: "Vol"
            desc: "ALES COMPLETAMENT NEGRES per sota (molt característic); carpó blanc"
          - label: "Hàbitat"
            desc: "rius i canals de reg"
      - nom: "Valona"
        nom_cientific: "Tringa glareola"
        imatge: "tringa-glareola.jpg"
        mida: "19–21 cm"
        caracteristiques:
          - label: "Dors"
            desc: "pigallat (menys fosc que la Xivita); cella blanca marcada"
          - label: "Vol"
            desc: "revers alar clar (no negre com la Xivita)"
          - label: "Reclam"
            desc: "«xif-if-if»"
      - nom: "Xivitona comuna"
        nom_cientific: "Actitis hypoleucos"
        imatge: "actitis-hypoleucos.jpg"
        mida: "18–20 cm"
        caracteristiques:
          - label: "Postura"
            desc: "encorbada, gronxa contínuament la part posterior"
          - label: "Vol"
            desc: "ales rígides cap avall, alterna cops ràpids amb planatges"
          - label: "Reclam"
            desc: "«hi-di-di-di» descendent"

  - id: becades
    nom: "Becades"
    mida: "18–38 cm"
    habitat: "Arrossars · Jonqueres · Boscos humits"
    clau: "Tots amb bec molt llarg i recte. Diferència principal: mida total, longitud relativa del bec, patró de la cua en vol i hàbitat. La Becada és forestal i crepuscular; els Becadells viuen en aiguamolls oberts."
    il_lustracions:
      - fitxer: becades.jpg
        peu: "Becadell gros, Becadell comú, Becadell sord"
    diferencies:
      - caracter: "Mida"
        descripcio: "Becadell sord: 18-20 cm; Becadell comú: 23-28 cm; Becadell gros: 26-30 cm; Becada: 33-38 cm"
      - caracter: "Cua (vol)"
        descripcio: "Becadell gros: laterals blanc pur (triple banda); Becadell comú: cua rogenca arrodonida"
      - caracter: "Vol"
        descripcio: "Becadell comú: vol en ziga-zaga explosiu; Becadell sord: vol recte i baix, silenciós"
    especies:
      - nom: "Becadell comú"
        nom_cientific: "Gallinago gallinago"
        imatge: "gallinago-gallinago.jpg"
        mida: "23–28 cm"
        caracteristiques:
          - label: "Bec"
            desc: "molt llarg (6-7 cm)"
          - label: "Cap"
            desc: "llista ocular fosca + cella clara + franja pileal clara"
          - label: "Vol"
            desc: "vol en ziga-zaga explosiu; cua rogenca arrodonida"
          - label: "Reclam"
            desc: "«xxeec» raspós en enlairar-se"
      - nom: "Becadell gros"
        nom_cientific: "Gallinago media"
        imatge: "gallinago-media.jpg"
        mida: "26–30 cm"
        caracteristiques:
          - label: "Cua"
            desc: "laterals de la cua BLANC PUR (diferència clau)"
          - label: "Ala"
            desc: "triple banda blanca longitudinal visible en vol"
          - label: "Vol"
            desc: "recte i poc alt; enlairament més lent que el Becadell"
      - nom: "Becadell sord"
        nom_cientific: "Lymnocryptes minimus"
        imatge: "lymnocryptes-minimus.png"
        mida: "18–20 cm"
        caracteristiques:
          - label: "Bec"
            desc: "clarament més curt que els altres becadells"
          - label: "Cap"
            desc: "DOBLE cella clara i pili fosc, SENSE franja central del Becadell"
          - label: "Vol"
            desc: "vol recte, baix i silenciós (no en ziga-zaga)"
      - nom: "Becada euràsiatica"
        nom_cientific: "Scolopax rusticola"
        imatge: "scolopax-rusticola.jpg"
        mida: "33–38 cm"
        caracteristiques:
          - label: "Mida"
            desc: "gran i corpulenta, la més gran del grup"
          - label: "Plomatge"
            desc: "bru rogenc molt críptic; barres transversals fosques al pit"
          - label: "Ales"
            desc: "curtes i arrodonides (adaptació al vol entre arbres)"
          - label: "Hàbitat"
            desc: "boscos humits; molt crepuscular"

  - id: batallaires
    nom: "Batallaires"
    mida: "22–32 cm"
    habitat: "Aiguamolls · Arrossars"
    clau: "Únic representant del grup a Catalunya. El fort dimorfisme sexual i els plomalls nupcials del mascle el fan inconfusible. Femelles i joves s'assemblen a un territ gran de potes clares."
    il_lustracions:
      - fitxer: batallaires.jpg
        peu: "Becada euràsiatica, Batallaire (♀ i ♂ nup.), Territ rogenc"
    diferencies:
      - caracter: "Dimorfisme"
        descripcio: "Mascle nup.: plomalls auriculars únics, colors molt variables (blanc, negre, rovell)"
      - caracter: "Mida"
        descripcio: "Mascle notablement major que femella (29-32 vs 22-26 cm)"
    especies:
      - nom: "Batallaire"
        nom_cientific: "Calidris pugnax"
        imatge: "calidris-pugnax.jpg"
        mida: "♂ 29–32 cm · ♀ 22–26 cm"
        caracteristiques:
          - label: "♂ nup."
            desc: "grans plomalls auriculars (color molt variable)"
          - label: "♀ / jove"
            desc: "dors fosc amb escames clares; potes olivàcies; cap petit"
          - label: "Vol"
            desc: "franja alar estreta + taca ovalada blanca a cada costat de la cua"
          - label: "Postura"
            desc: "coll relativament llarg i postura erecta característica"

  - id: tetols
    nom: "Tètols"
    mida: "35–42 cm"
    habitat: "Aiguamolls litorals · Fangars"
    clau: "Limícoles grans amb bec recte i potes molt llargues. Caràcter diagnòstic principal: la cua negra (Cuanegre) vs. cua totalment barrada (Cuabarrat). La franja alar en vol ho confirma."
    il_lustracions:
      - fitxer: tetols.jpg
        peu: "Tètol cuanegre, Tètol cuabarrat"
    diferencies:
      - caracter: "Cua"
        descripcio: "Cuanegre: cua NEGRA amb base blanca; Cuabarrat: cua TOTALMENT BARRADA"
      - caracter: "Bec"
        descripcio: "Cuanegre: recte; Cuabarrat: lleugerament corbat cap amunt"
      - caracter: "Vol"
        descripcio: "Cuanegre: àmplia franja alar blanca; Cuabarrat: SENSE franja alar"
    especies:
      - nom: "Tètol cuanegre"
        nom_cientific: "Limosa limosa"
        imatge: "limosa-limosa.jpg"
        mida: "37–42 cm"
        caracteristiques:
          - label: "Cua"
            desc: "CUA NEGRA amb base blanca (diagnòstic)"
          - label: "Bec"
            desc: "molt llarg i recte; base color carn, extrem negre"
          - label: "Potes"
            desc: "negres, extremadament llargues"
          - label: "Vol"
            desc: "àmplia franja alar blanca + cua negra = inequívoc"
      - nom: "Tètol cuabarrat"
        nom_cientific: "Limosa lapponica"
        imatge: "limosa-lapponica.jpg"
        mida: "35–41 cm"
        caracteristiques:
          - label: "Cua"
            desc: "CUA TOTALMENT BARRADA (diagnòstic)"
          - label: "Bec"
            desc: "lleugerament corbat cap amunt"
          - label: "♂ nup."
            desc: "cap, coll i pit de color rovell intens"
          - label: "Vol"
            desc: "SENSE franja alar; carpó i tascó blancs"

  - id: siglots
    nom: "Siglots"
    mida: "37–57 cm"
    habitat: "Aiguamolls · Erms · Litoral"
    clau: "Els siglots (curleres) són els limícoles més grans, amb bec extremadament llarg i corbat. El Becut és el major limícola de Catalunya. La cella i el pili molt marcats diferencien el Polit del Becut."
    il_lustracions:
      - fitxer: siglots.jpg
        peu: "Becut euràsiàtic, Polit cantaire"
    diferencies:
      - caracter: "Mida"
        descripcio: "Becut: 48-57 cm (el major limícola); Polit: 37-45 cm"
      - caracter: "Bec"
        descripcio: "Becut: extremadament llarg i corbat; Polit: bec clarament menys corbat i més curt"
      - caracter: "Cap"
        descripcio: "Polit: cella clara molt marcada, pili dividit per banda central; Becut: cap llistat uniforme"
    especies:
      - nom: "Becut euràsiàtic"
        nom_cientific: "Numenius arquata"
        imatge: "numenius-arquata.jpg"
        mida: "48–57 cm"
        caracteristiques:
          - label: "Bec"
            desc: "extremadament llarg i corbat (sobretot femelles)"
          - label: "Plomatge"
            desc: "bru grisós pigallat; carpó cuneïforme blanc"
          - label: "Cap"
            desc: "llistat relativament uniforme (sense cella molt marcada)"
          - label: "Reclam"
            desc: "«cur-luí» descendent"
      - nom: "Polit cantaire"
        nom_cientific: "Numenius phaeopus"
        imatge: "numenius-phaeopus.jpg"
        mida: "37–45 cm"
        caracteristiques:
          - label: "Bec"
            desc: "clarament menys corbat i més curt que el Becut"
          - label: "Cap"
            desc: "CELLA CLARA molt marcada; pili fosc dividit per banda central clara"
          - label: "Pit"
            desc: "pigallat sobre fons blanquinós/crema"
          - label: "Reclam"
            desc: "renill de picot, explosiu"
