<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-title">
        <span class="title-main">Limícoles</span>
        <span class="title-sub">de Catalunya</span>
      </a>
      <nav class="main-nav">
        <a href="{{ '/identificacio-rapida/' | relative_url }}" class="nav-key">Identificació ràpida</a>
        {% for grup in site.data.species.grups %}
        <a href="{{ '/grups/' | append: grup.id | append: '/' | relative_url }}">{{ grup.nom }}</a>
        {% endfor %}
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>Guia d'identificació de limícoles de Catalunya · Ús didàctic</p>
  </footer>

</body>
</html>
